# ===========================
# Café Noir — Docker Compose
# Production-ready multi-service setup
# ===========================

version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cafe-noir-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:./db/production.db
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-this-in-production}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      # - ZAI_API_KEY=${ZAI_API_KEY}
      # - SMTP_HOST=${SMTP_HOST}
      # - SMTP_PORT=${SMTP_PORT}
      # - SMTP_USER=${SMTP_USER}
      # - SMTP_PASSWORD=${SMTP_PASSWORD}
      # - SMTP_FROM=${SMTP_FROM}
    volumes:
      - app-db:/app/db
      - app-uploads:/app/upload
    networks:
      - cafe-noir-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

